# =============================================================================
# CI/CD Pipeline - Allsome Orders Analytics
#
# Triggered on push/PR to main branch. Runs three jobs:
# 1. test-backend:  Runs Django tests with a MySQL service container
# 2. test-frontend: Runs React tests and builds the frontend
# 3. deploy:        Deploys to EC2 via SSH (only on main branch push)
#
# Required GitHub Secrets for deployment:
# - EC2_HOST:    Public IP or hostname of the EC2 instance
# - EC2_SSH_KEY: Private SSH key for accessing the EC2 instance
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_pass
          MYSQL_DATABASE: allsome_orders_test
          MYSQL_USER: allsome
          MYSQL_PASSWORD: allsome_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DB_NAME: allsome_orders_test
          DB_USER: allsome
          DB_PASSWORD: allsome_pass
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DJANGO_SECRET_KEY: test-secret-key
          DJANGO_DEBUG: "True"
        run: |
          cd backend
          python manage.py test --verbosity=2

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests
        run: |
          cd frontend
          npm test -- --watchAll=false

      - name: Build
        run: |
          cd frontend
          npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/allsome-orders

            # Pull latest code
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone ${{ github.server_url }}/${{ github.repository }}.git .
            fi

            # Load environment variables
            set -a && source .env && set +a

            # Build and restart containers
            docker compose down
            docker compose up -d --build

            # Run migrations
            docker compose exec -T backend python manage.py migrate

            # Import data if not already done
            docker compose exec -T backend python manage.py import_csv /app/data/allsome_interview_test_orders.csv || true

            echo "Deployment complete!"
